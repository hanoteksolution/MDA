# Hostinger VPS overrides — public port 8010 serves web UI + API via nginx.

services:

  db:

    ports:

      - "127.0.0.1:5437:5432"



  api:

    env_file:

      - ../../backend/.env.cloud



  web:

    image: nginx:1.27-alpine

    restart: unless-stopped

    ports:

      - "8010:80"

    volumes:

      - ../../frontend/dist:/usr/share/nginx/html:ro

      - ./nginx.web.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:

      - api

